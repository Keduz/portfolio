<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="40%" stop-color="#0a0a1f"/>
      <stop offset="100%" stop-color="#0d0d24"/>
    </linearGradient>

    <!-- Accent gradients -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#00D4AA"/>
    </linearGradient>
    <linearGradient id="accentGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#00D4AA"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C63FF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00D4AA" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="nodeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#8B83FF"/>
    </linearGradient>
    <linearGradient id="nodeGlow2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4AA"/>
      <stop offset="100%" stop-color="#00B894"/>
    </linearGradient>
    <linearGradient id="dividerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="30%" stop-color="#6C63FF" stop-opacity="0.3"/>
      <stop offset="70%" stop-color="#00D4AA" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="tagGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6C63FF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6C63FF" stop-opacity="0.05"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glowPurple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feFlood flood-color="#6C63FF" flood-opacity="0.15"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowTeal" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feFlood flood-color="#00D4AA" flood-opacity="0.1"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowNode" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowNodeSm" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
    </pattern>

    <!-- Dot pattern -->
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.5" fill="rgba(255,255,255,0.06)"/>
    </pattern>

    <!-- Clip for clean edges -->
    <clipPath id="frame">
      <rect width="1200" height="630" rx="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)" clip-path="url(#frame)"/>

  <!-- Grid overlay -->
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.6"/>
  <rect width="1200" height="630" fill="url(#dots)" opacity="0.5"/>

  <!-- Large ambient glow orbs -->
  <circle cx="200" cy="150" r="280" fill="#6C63FF" opacity="0.04" filter="url(#glowPurple)"/>
  <circle cx="950" cy="450" r="250" fill="#00D4AA" opacity="0.03" filter="url(#glowTeal)"/>
  <circle cx="700" cy="100" r="200" fill="#6C63FF" opacity="0.025"/>
  <ellipse cx="400" cy="550" rx="350" ry="150" fill="#00D4AA" opacity="0.015"/>

  <!-- ===== RIGHT SIDE: Neural Network / Tech Visual ===== -->
  <g opacity="0.9">
    <!-- Connection lines (neural network) -->
    <!-- Layer 1 to Layer 2 -->
    <line x1="750" y1="120" x2="870" y2="80" stroke="url(#lineGrad)" stroke-width="1" opacity="0.5"/>
    <line x1="750" y1="120" x2="880" y2="180" stroke="url(#lineGrad)" stroke-width="1" opacity="0.4"/>
    <line x1="750" y1="120" x2="900" y2="280" stroke="url(#lineGrad)" stroke-width="0.8" opacity="0.25"/>
    <line x1="770" y1="250" x2="870" y2="80" stroke="url(#lineGrad)" stroke-width="0.8" opacity="0.3"/>
    <line x1="770" y1="250" x2="880" y2="180" stroke="url(#lineGrad)" stroke-width="1" opacity="0.5"/>
    <line x1="770" y1="250" x2="900" y2="280" stroke="url(#lineGrad)" stroke-width="1" opacity="0.45"/>
    <line x1="760" y1="380" x2="880" y2="180" stroke="url(#lineGrad)" stroke-width="0.8" opacity="0.25"/>
    <line x1="760" y1="380" x2="900" y2="280" stroke="url(#lineGrad)" stroke-width="1" opacity="0.45"/>
    <line x1="760" y1="380" x2="890" y2="400" stroke="url(#lineGrad)" stroke-width="1" opacity="0.5"/>
    <line x1="740" y1="500" x2="900" y2="280" stroke="url(#lineGrad)" stroke-width="0.8" opacity="0.2"/>
    <line x1="740" y1="500" x2="890" y2="400" stroke="url(#lineGrad)" stroke-width="1" opacity="0.45"/>
    <line x1="740" y1="500" x2="880" y2="510" stroke="url(#lineGrad)" stroke-width="1" opacity="0.5"/>

    <!-- Layer 2 to Layer 3 -->
    <line x1="870" y1="80" x2="1010" y2="150" stroke="url(#lineGrad)" stroke-width="1" opacity="0.45"/>
    <line x1="870" y1="80" x2="1020" y2="310" stroke="url(#lineGrad)" stroke-width="0.8" opacity="0.2"/>
    <line x1="880" y1="180" x2="1010" y2="150" stroke="url(#lineGrad)" stroke-width="1" opacity="0.5"/>
    <line x1="880" y1="180" x2="1020" y2="310" stroke="url(#lineGrad)" stroke-width="1" opacity="0.5"/>
    <line x1="880" y1="180" x2="1000" y2="470" stroke="url(#lineGrad)" stroke-width="0.8" opacity="0.25"/>
    <line x1="900" y1="280" x2="1010" y2="150" stroke="url(#lineGrad)" stroke-width="0.8" opacity="0.3"/>
    <line x1="900" y1="280" x2="1020" y2="310" stroke="url(#lineGrad)" stroke-width="1" opacity="0.55"/>
    <line x1="900" y1="280" x2="1000" y2="470" stroke="url(#lineGrad)" stroke-width="1" opacity="0.4"/>
    <line x1="890" y1="400" x2="1020" y2="310" stroke="url(#lineGrad)" stroke-width="1" opacity="0.45"/>
    <line x1="890" y1="400" x2="1000" y2="470" stroke="url(#lineGrad)" stroke-width="1" opacity="0.5"/>
    <line x1="880" y1="510" x2="1000" y2="470" stroke="url(#lineGrad)" stroke-width="1" opacity="0.5"/>
    <line x1="880" y1="510" x2="1020" y2="310" stroke="url(#lineGrad)" stroke-width="0.8" opacity="0.2"/>

    <!-- Layer 3 to output -->
    <line x1="1010" y1="150" x2="1120" y2="280" stroke="url(#lineGrad)" stroke-width="1.2" opacity="0.5"/>
    <line x1="1020" y1="310" x2="1120" y2="280" stroke="url(#lineGrad)" stroke-width="1.5" opacity="0.6"/>
    <line x1="1000" y1="470" x2="1120" y2="280" stroke="url(#lineGrad)" stroke-width="1.2" opacity="0.5"/>

    <!-- Extra decorative connections -->
    <line x1="680" y1="60" x2="750" y2="120" stroke="#6C63FF" stroke-width="0.5" opacity="0.2"/>
    <line x1="690" y1="560" x2="740" y2="500" stroke="#00D4AA" stroke-width="0.5" opacity="0.2"/>
    <line x1="1120" y1="280" x2="1170" y2="240" stroke="#00D4AA" stroke-width="0.6" opacity="0.25"/>
    <line x1="1120" y1="280" x2="1165" y2="330" stroke="#6C63FF" stroke-width="0.6" opacity="0.25"/>

    <!-- Neural network nodes - Layer 1 (input) -->
    <circle cx="750" cy="120" r="6" fill="url(#nodeGlow)" opacity="0.9" filter="url(#glowNodeSm)"/>
    <circle cx="770" cy="250" r="7" fill="url(#nodeGlow)" opacity="0.85" filter="url(#glowNodeSm)"/>
    <circle cx="760" cy="380" r="6" fill="url(#nodeGlow2)" opacity="0.8" filter="url(#glowNodeSm)"/>
    <circle cx="740" cy="500" r="5" fill="url(#nodeGlow2)" opacity="0.75" filter="url(#glowNodeSm)"/>

    <!-- Layer 2 (hidden) -->
    <circle cx="870" cy="80" r="5" fill="url(#nodeGlow)" opacity="0.8" filter="url(#glowNodeSm)"/>
    <circle cx="880" cy="180" r="8" fill="url(#nodeGlow)" opacity="0.9" filter="url(#glowNode)"/>
    <circle cx="900" cy="280" r="9" fill="url(#accentGrad)" opacity="0.95" filter="url(#glowNode)"/>
    <circle cx="890" cy="400" r="7" fill="url(#nodeGlow2)" opacity="0.85" filter="url(#glowNodeSm)"/>
    <circle cx="880" cy="510" r="5" fill="url(#nodeGlow2)" opacity="0.7" filter="url(#glowNodeSm)"/>

    <!-- Layer 3 (hidden) -->
    <circle cx="1010" cy="150" r="7" fill="url(#nodeGlow)" opacity="0.85" filter="url(#glowNodeSm)"/>
    <circle cx="1020" cy="310" r="10" fill="url(#accentGrad)" opacity="0.9" filter="url(#glowNode)"/>
    <circle cx="1000" cy="470" r="6" fill="url(#nodeGlow2)" opacity="0.8" filter="url(#glowNodeSm)"/>

    <!-- Output node (large, prominent) -->
    <circle cx="1120" cy="280" r="14" fill="url(#accentGrad)" opacity="0.95" filter="url(#glowNode)"/>
    <circle cx="1120" cy="280" r="8" fill="#0a0a1f" opacity="0.6"/>
    <circle cx="1120" cy="280" r="5" fill="url(#accentGrad)" opacity="0.9"/>

    <!-- Tiny floating particles -->
    <circle cx="680" cy="60" r="2" fill="#6C63FF" opacity="0.4"/>
    <circle cx="820" cy="40" r="1.5" fill="#6C63FF" opacity="0.3"/>
    <circle cx="950" cy="50" r="2" fill="#00D4AA" opacity="0.25"/>
    <circle cx="1080" cy="100" r="1.5" fill="#6C63FF" opacity="0.3"/>
    <circle cx="1150" cy="180" r="2" fill="#00D4AA" opacity="0.35"/>
    <circle cx="690" cy="560" r="2" fill="#00D4AA" opacity="0.3"/>
    <circle cx="830" cy="580" r="1.5" fill="#6C63FF" opacity="0.25"/>
    <circle cx="960" cy="570" r="2" fill="#00D4AA" opacity="0.3"/>
    <circle cx="1100" cy="520" r="1.5" fill="#6C63FF" opacity="0.25"/>
    <circle cx="1170" cy="240" r="2" fill="#00D4AA" opacity="0.4"/>
    <circle cx="1165" cy="330" r="2" fill="#6C63FF" opacity="0.35"/>
    <circle cx="720" cy="180" r="1" fill="#8B83FF" opacity="0.35"/>
    <circle cx="710" cy="440" r="1" fill="#00B894" opacity="0.3"/>
    <circle cx="950" cy="130" r="1.5" fill="#8B83FF" opacity="0.2"/>
    <circle cx="940" cy="550" r="1" fill="#00B894" opacity="0.2"/>

    <!-- Decorative orbit rings -->
    <ellipse cx="900" cy="280" rx="180" ry="220" fill="none" stroke="#6C63FF" stroke-width="0.4" opacity="0.08" transform="rotate(-15, 900, 280)"/>
    <ellipse cx="900" cy="280" rx="250" ry="280" fill="none" stroke="#00D4AA" stroke-width="0.3" opacity="0.05" transform="rotate(10, 900, 280)"/>
  </g>

  <!-- ===== Vertical divider line ===== -->
  <line x1="640" y1="80" x2="640" y2="550" stroke="url(#dividerGrad)" stroke-width="1" opacity="0.4"/>

  <!-- ===== LEFT SIDE: Text Content ===== -->
  <g>
    <!-- Code bracket decorative -->
    <text x="70" y="140" font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace" font-size="42" font-weight="700" fill="url(#accentGrad)" filter="url(#textGlow)">&lt;K/&gt;</text>

    <!-- Main title -->
    <text x="70" y="230" font-family="'Space Grotesk', 'Inter', 'SF Pro Display', -apple-system, sans-serif" font-size="56" font-weight="700" fill="#F5F5F7" letter-spacing="-1">Kadu</text>

    <!-- Subtitle with gradient -->
    <text x="70" y="285" font-family="'Space Grotesk', 'Inter', 'SF Pro Display', -apple-system, sans-serif" font-size="26" font-weight="600" fill="url(#accentGrad)">Desenvolvedor IA &amp; Automacao</text>

    <!-- Accent line under subtitle -->
    <rect x="70" y="300" width="200" height="2" rx="1" fill="url(#accentGrad2)" opacity="0.6"/>

    <!-- Description -->
    <text x="70" y="345" font-family="'Inter', 'SF Pro Text', -apple-system, sans-serif" font-size="16" fill="#8A8F98" letter-spacing="0.3">Especialista em Python, Inteligencia Artificial</text>
    <text x="70" y="370" font-family="'Inter', 'SF Pro Text', -apple-system, sans-serif" font-size="16" fill="#8A8F98" letter-spacing="0.3">e automacao de processos.</text>

    <!-- Tech stack tags -->
    <g transform="translate(70, 420)">
      <!-- Python -->
      <rect x="0" y="0" width="88" height="32" rx="16" fill="url(#tagGrad1)" stroke="#6C63FF" stroke-width="0.8" stroke-opacity="0.3"/>
      <text x="44" y="21" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="12" font-weight="500" fill="#A29BFF" text-anchor="middle">Python</text>

      <!-- IA -->
      <rect x="100" y="0" width="52" height="32" rx="16" fill="url(#tagGrad1)" stroke="#6C63FF" stroke-width="0.8" stroke-opacity="0.3"/>
      <text x="126" y="21" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="12" font-weight="500" fill="#A29BFF" text-anchor="middle">IA</text>

      <!-- Automacao -->
      <rect x="164" y="0" width="110" height="32" rx="16" fill="url(#tagGrad1)" stroke="#00D4AA" stroke-width="0.8" stroke-opacity="0.3"/>
      <text x="219" y="21" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="12" font-weight="500" fill="#00D4AA" text-anchor="middle">Automacao</text>

      <!-- APIs -->
      <rect x="286" y="0" width="62" height="32" rx="16" fill="url(#tagGrad1)" stroke="#6C63FF" stroke-width="0.8" stroke-opacity="0.3"/>
      <text x="317" y="21" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="12" font-weight="500" fill="#A29BFF" text-anchor="middle">APIs</text>

      <!-- ML -->
      <rect x="360" y="0" width="140" height="32" rx="16" fill="url(#tagGrad1)" stroke="#00D4AA" stroke-width="0.8" stroke-opacity="0.3"/>
      <text x="430" y="21" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="12" font-weight="500" fill="#00D4AA" text-anchor="middle">Machine Learning</text>
    </g>

    <!-- Bottom URL line -->
    <text x="70" y="560" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="13" fill="#4A4F5A" letter-spacing="1">keduz.github.io/portfolio</text>
    <circle cx="280" cy="556" r="3" fill="url(#accentGrad)" opacity="0.6"/>
  </g>

  <!-- Top and bottom accent lines -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#accentGrad2)" opacity="0.5"/>
  <rect x="0" y="628" width="1200" height="2" fill="url(#accentGrad2)" opacity="0.3"/>

  <!-- Corner accents -->
  <path d="M0,0 L50,0 L0,0 L0,50" stroke="url(#accentGrad)" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M1200,0 L1150,0 M1200,0 L1200,50" stroke="url(#accentGrad)" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M0,630 L50,630 M0,630 L0,580" stroke="url(#accentGrad)" stroke-width="2" fill="none" opacity="0.2"/>
  <path d="M1200,630 L1150,630 M1200,630 L1200,580" stroke="url(#accentGrad)" stroke-width="2" fill="none" opacity="0.2"/>
</svg>
